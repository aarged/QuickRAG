<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1" />

    <meta property="og:title" content="QuickRag" />
    <meta property="og:description" content="A minimalist, lightweight RAG chatbot demonstration app." />
    <meta property="og:type" content="website" />
    <meta property="og:image" content="https://replit.com/public/images/opengraph.png" />
    <meta name="twitter:card" content="summary_large_image" />

    <meta name="twitter:title" content="QuickRag" />
    <meta name="twitter:description" content="A minimalist, lightweight RAG chatbot demonstration app." />

    <!--
      Cloudflare Web Analytics (cookieless, no consent banner required).
      OWNER SETUP: create a free Cloudflare account, add the published URL under
      "Web Analytics", copy the generated beacon token, and set it as the
      VITE_CLOUDFLARE_BEACON_TOKEN environment variable (the %VITE_...% below is
      replaced at build time by Vite). Until a real token is supplied, the beacon
      will simply not report any data.
    -->
    <script defer src="https://static.cloudflareinsights.com/beacon.min.js" data-cf-beacon='{"token": "%VITE_CLOUDFLARE_BEACON_TOKEN%"}'></script>

    <link rel="icon" type="image/png" href="/favicon.png" />
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
  </head>

  </body>
